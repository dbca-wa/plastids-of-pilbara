<div>
	<style>
		@import "https://cdn.datatables.net/v/dt/dt-1.10.13/af-2.1.3/b-1.2.4/b-colvis-1.2.4/b-html5-1.2.4/cr-1.3.2/fc-3.2.2/fh-3.1.2/kt-2.2.0/rr-1.2.0/sc-1.4.2/se-1.2.0/datatables.min.css";
	</style>
	<script src="data/rows.js"></script>

	<table id='table' class='hover compact'>
		<thead>
			<tr>
				<th>ID</th>
				<th>Herbarium</th>
				<th>FloraBase</th>
				<th>Status</th>
				<th>Family</th>
				<th>Species</th>
				<th>Genome</th>
				<!--<th>rDNA</th>-->
				<th>Reads</th>
			</tr>
		</thead>
		<tbody></tbody>
	</table>

	<div><a href='data/table.tsv' download><button>Download metadata (tab-delimited)</button></a></div>

	<script type="text/javascript">

		function show_metadata(r) {
			alert(JSON.stringify(rows[r],null,2));
		}

		let cols = rows.shift();

		for (let r=0; r<rows.length; ++r) {
			let obj = {};
			for (let c=0; c<cols.length; ++c) obj[cols[c]] = rows[r][c];
			rows[r] = obj;
		}

		// constructor (in a closure to avoid collision)
		new function()
		{
			console.log('BUILDING');
			// build the table subset to show the client
			let table_data = [];

			for (let i=0; i<rows.length; ++i)
			{
				let r = rows[i];

				//ID,Herbarium,FloraBase,Status,Species,FastA,FastQ
				//["index","id","plate","well","sample","florabase","sheet_id","exclude_cpt","family","name","filename","url_fastq"],
				table_data.push([

					// local ID, clicks to open full metadata record
					`<a onclick='show_metadata(${i});'>${r.id}</a>`,

					// herbarium or ausplot ID
					r.sheet_id,

					// florabase link
					r.florabase ? `<a target='new' href='https://florabase.dpaw.wa.gov.au/browse/profile/${r.florabase}'>${r.florabase}</a>` : '',

					// status
					r.exclude_cpt === "true" ? 'query' : 'ok',

					// family
					r.family,

					// itallicised species
					`<em>${r.name.split("_").join(' ')}</em>`,

					// link to genome FastA file
					r.filename ? `<a target='new' href='data/sequences/${r.filename}'>FastA</a>` : '',

					// link to rDNA FastA file
					//r.rdna_file ? `<a target='new' href='data/rdna/rdna_${r.id}.fa'>FastA</a>` : '',

					// link to FastQ data store
					//`<a target='new' href='https://downloads-qcif.bioplatforms.com/bpa/barcode/pilbara_flora/sets/metagenomics/agrf/${r.url_fastq}'>FastQ</a>`
					`<a target='new' href='${r.url_fastq}'>FastQ</a>`
				]);
			}

			setTimeout(function() {
				alert('timer done');
				let dt = $('#table').DataTable({
					scrollY : "600px",
					scrollCollapse : true,
					paging : false,
					data : table_data,
					order : [[4,'asc'],[5,'asc']]
				});
			},5000);
		}
	</script>

</div>
