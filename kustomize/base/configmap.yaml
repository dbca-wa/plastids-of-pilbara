apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-default-conf
data:
  default.conf: |
    server {
        listen 8080;
        server_name localhost;
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }
    }
    server {
        listen 8081;
        server_name localhost;
        set $proxy_upstream_name "internal";
        keepalive_timeout 0;
        access_log off;
        location /healthz { return 200; }
    }
