apiVersion: apps/v1
kind: Deployment
metadata:
  name: plastids-deploy
  labels:
    app: plastids
spec:
  selector:
    matchLabels:
      app: plastids
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: plastids
    spec:
      containers:
        - name: plastids
          image: ghcr.io/dbca-wa/plastids-of-pilbara
          imagePullPolicy: Always
          env:
            - name: TZ
              value: 'Australia/Perth'
          resources:
            requests:
              memory: '16Mi'
              cpu: '1m'
            limits:
              memory: '1Gi'
              cpu: '500m'
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 8081
              scheme: HTTP
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 8081
              scheme: HTTP
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          securityContext:
            runAsNonRoot: true
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /tmp
              name: tmpfs-ram
            - mountPath: /etc/nginx/conf.d
              name: default-conf
              readOnly: true
      volumes:
        - name: tmpfs-ram
          emptyDir:
            medium: 'Memory'
      restartPolicy: Always
      terminationGracePeriodSeconds: 180
      automountServiceAccountToken: false
