apiVersion: v1
kind: ConfigMap
metadata:
  name: default-conf
data:
  default.conf: |
    server {
        listen 8080;
        server_name localhost;
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
        }
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
    server {
        listen 8081;
        server_name localhost;
        set $proxy_upstream_name "internal";
        keepalive_timeout 0;
        access_log off;
        location /healthz { return 200; }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-cdn-prod
spec:
  selector:
    matchLabels:
      app: nginx
  replicas: 2
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx-static-cdn-prod
          image: nginxinc/nginx-unprivileged:stable-alpine
          imagePullPolicy: Always
          resources:
            requests:
              memory: '16Mi'
              cpu: '1m'
            limits:
              memory: '1Gi'
              cpu: '500m'
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 8081
              scheme: HTTP
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 8081
              scheme: HTTP
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          securityContext:
            runAsNonRoot: true
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /tmp
              name: tmpfs-ram
            - mountPath: /etc/nginx/conf.d
              name: default-conf
              readOnly: true
      volumes:
        - name: tmpfs-ram
          emptyDir:
            medium: 'Memory'
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: static-cdn-hpa-prod
spec:
  minReplicas: 2
  maxReplicas: 5
  scaleTargetRef:
    kind: Deployment
    apiVersion: apps/v1
    name: static-cdn-prod
  metrics:
    - resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 500
      type: Resource
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: static-cdn-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: nginx
---
apiVersion: v1
kind: Service
metadata:
  name: static-cdn-clusterip-prod
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    app: nginx
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: static-cdn-ingress
spec:
  rules:
    - host: static.dbca.wa.gov.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: static-cdn-clusterip-prod
                port:
                  number: 8080
